<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klassekampen – Bestill abonnement</title>
  <link rel="stylesheet" href="trade-gothic-lt-std-webfont/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trade Gothic LT Std Regular', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', sans-serif;
      color: #1a1a1a;
      background: #fff;
      overflow-x: hidden;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-center { position: absolute; left: 50%; transform: translateX(-50%); }
    .header-right { display: flex; align-items: center; gap: 16px; }

    .btn-search {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px solid #ccc;
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 15px;
      color: #1a1a1a;
      cursor: pointer;
      transition: border-color .2s;
    }
    .btn-search:hover { border-color: #888; }
    .btn-search svg { width: 16px; height: 16px; }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo svg {
      height: 38px;
      width: auto;
      fill: #d42b2b;
    }
    @media (max-width: 600px) { .logo svg { height: 26px; } }

    .btn-cta {
      background: #d42b2b;
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    .btn-cta:hover { background: #b82222; }

    .btn-cta-outline {
      background: transparent;
      color: #d42b2b;
      border: 1.5px solid #d42b2b;
      border-radius: 28px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, color .2s;
    }
    .btn-cta-outline:hover {
      background: #d42b2b;
      color: #fff;
    }

    .btn-hamburger {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 6px;
    }
    .btn-hamburger span {
      display: block;
      width: 26px;
      height: 2.5px;
      background: #1a1a1a;
      border-radius: 2px;
    }

    /* ── Subscription Page ─────────────────────────── */
    .sub-page {
      max-width: 540px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .toggle-group {
      display: flex;
      background: #f5f0f0;
      border-radius: 30px;
      overflow: hidden;
      border: 2px solid #f5f0f0;
    }

    .toggle-group input[type="radio"] { display: none; }

    .toggle-group label {
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 30px;
      transition: all .25s ease;
      color: #d42b2b;
      user-select: none;
    }

    .toggle-group input[type="radio"]:checked + label {
      background: #d42b2b;
      color: #fff;
    }

    /* Heading */
    .sub-heading {
      font-family: 'Trade Gothic Next LT Pro Heavy', 'Trade Gothic LT Std Bold Condensed No. 20', 'Helvetica Neue', sans-serif;
      font-size: 30px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 28px;
      color: #1a1a1a;
    }

    /* Plan cards */
    .plan-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      background: #fff;
      position: relative;
    }

    .plan-card:hover {
      border-color: #ccc;
    }

    .plan-card.selected {
      border-color: #d42b2b;
      box-shadow: 0 0 0 1px #d42b2b;
    }

    .plan-card input[type="radio"] { display: none; }

    /* Custom radio */
    .radio-circle {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
      margin-top: 4px;
    }

    .radio-circle::after {
      content: '';
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d42b2b;
      transform: scale(0);
      transition: transform .2s ease;
    }

    .plan-card.selected .radio-circle {
      border-color: #d42b2b;
    }

    .plan-card.selected .radio-circle::after {
      transform: scale(1);
    }

    .plan-info {
      flex: 1;
      min-width: 0;
    }

    .plan-name {
      font-family: 'Trade Gothic Next LT Pro Heavy', 'Trade Gothic LT Std Bold Condensed No. 20', 'Helvetica Neue', sans-serif;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 6px;
      color: #1a1a1a;
    }

    .plan-desc {
      font-size: 15px;
      color: #444;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .plan-price {
      font-size: 14px;
      color: #888;
    }

    /* Popular badge */
    .badge-popular {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #d42b2b;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      letter-spacing: .3px;
    }

    /* ── Enhanced Digital card ────────────────────── */
    .plan-card-digital {
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      margin-bottom: 16px;
      background: #fdf8f8;
      position: relative;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }

    .plan-card-digital.has-selection {
      border-color: #d42b2b;
      box-shadow: 0 0 0 1px #d42b2b;
    }

    .plan-card-digital-header {
      padding: 24px 24px 16px;
    }

    .plan-card-digital-header .plan-name {
      font-family: 'Trade Gothic Next LT Pro Heavy', 'Trade Gothic LT Std Bold Condensed No. 20', 'Helvetica Neue', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .plan-card-digital-header .plan-desc {
      font-size: 15px;
      color: #444;
      line-height: 1.45;
    }

    .digital-options {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .digital-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      cursor: pointer;
      border-top: 1px solid #eee;
      transition: background .15s;
    }

    .digital-option:hover {
      background: rgba(212, 43, 43, .04);
    }

    .digital-option.selected {
      background: rgba(212, 43, 43, .06);
    }

    .digital-option input[type="radio"] { display: none; }

    .digital-option .radio-circle {
      margin-top: 0;
    }

    .digital-option-info {
      flex: 1;
      min-width: 0;
    }

    .digital-option-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .digital-option-price {
      font-size: 13px;
      color: #888;
    }

    .digital-option-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: #fff;
      background: #2a9d4e;
      border-radius: 5px;
      padding: 4px 10px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1.5px solid #e8e8e8;
      margin: 32px 0;
    }

    /* CTA button */
    .btn-continue {
      display: block;
      width: 280px;
      margin: 0 auto 24px;
      background: #d42b2b;
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 16px 0;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      text-align: center;
    }
    .btn-continue:hover { background: #b82222; }

    /* Vipps logo */
    .vipps-wrap {
      text-align: center;
    }

    .vipps-logo {
      height: 22px;
      width: auto;
    }

    /* ── Student pricing toggle ─────────────────── */
    .student-prices .plan-price { display: none; }
    .student-prices .plan-price-student { display: block; }
    .plan-price-student { display: none; font-size: 14px; color: #888; }
    .digital-option-price.plan-price-student { font-size: 13px; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 600px) {
      .sub-page { padding: 28px 16px 48px; }
      .sub-heading { font-size: 24px; margin-bottom: 22px; }
      .plan-card { padding: 20px; }
      .plan-name { font-size: 19px; }
      .plan-desc { font-size: 14px; }
      .btn-continue { width: 240px; font-size: 16px; padding: 14px 0; }
      .header-right .header-cta { display: none !important; }
      .plan-card-digital-header { padding: 20px 20px 12px; }
      .digital-option { padding: 12px 20px; }
      .digital-option-title { font-size: 14px; }
    }

    @media (max-width: 375px) {
      .sub-page { padding: 20px 12px 36px; }
      .sub-heading { font-size: 22px; }
      .toggle-group label { padding: 8px 22px; font-size: 14px; }
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════ -->
<header>
  <div class="header-left">
    <button class="btn-search" aria-label="Søk">
      <span>Søk</span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div class="header-center">
    <a href="index.html" class="logo" aria-label="Klassekampen">

      </svg>
    </a>
  </div>

  <div class="header-right">
    <button class="btn-cta-outline header-cta" onclick="window.location.href='index.html'">Tilbake</button>
    <button class="btn-hamburger" aria-label="Åpne meny">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ═══ SUBSCRIPTION PAGE ══════════════════════════════ -->
<div class="sub-page" id="subPage">

  <!-- Standard / Student toggle -->
  <div class="toggle-wrap">
    <div class="toggle-group">
      <input type="radio" name="audience" id="togStandard" value="standard" checked>
      <label for="togStandard">Standard</label>
      <input type="radio" name="audience" id="togStudent" value="student">
      <label for="togStudent">Student</label>
    </div>
  </div>

  <h1 class="sub-heading">Hvordan vil du lese avisa?</h1>

  <!-- Digital (enhanced) -->
  <div class="plan-card-digital" id="digitalCard">
    <div class="plan-card-digital-header">
      <div class="plan-name">Digital</div>
      <div class="plan-desc">Full tilgang på nett hver dag. Musikk- og Bokmagasinet inkludert.</div>
    </div>
    <div class="digital-options">
      <label class="digital-option" data-plan="digital-monthly">
        <input type="radio" name="plan" value="digital-monthly">
        <span class="radio-circle"></span>
        <div class="digital-option-info">
          <div class="digital-option-title">Prøv for 1 krone</div>
          <div class="digital-option-price">Deretter 399 kr/mnd</div>
          <div class="digital-option-price plan-price-student">Deretter 299 kr/mnd</div>
        </div>
      </label>
      <label class="digital-option" data-plan="digital-3month">
        <input type="radio" name="plan" value="digital-3month">
        <span class="radio-circle"></span>
        <div class="digital-option-info">
          <div class="digital-option-title">3 måneder for 700 kr</div>
          <div class="digital-option-price">Spar over 40 % – ca. 233 kr/mnd</div>
        </div>
        <span class="digital-option-badge">Spar</span>
      </label>
    </div>
  </div>

  <!-- Helgepakka -->
  <label class="plan-card selected" data-plan="helgepakka">
    <input type="radio" name="plan" value="helgepakka" checked>
    <span class="radio-circle"></span>
    <span class="badge-popular">Mest populær</span>
    <div class="plan-info">
      <div class="plan-name">Helgepakka</div>
      <div class="plan-desc">Papiravis fredag og lørdag + alt digitalt og alle magasiner.</div>
      <div class="plan-price">Deretter 459 kroner hver måned</div>
      <div class="plan-price-student">Deretter 345 kroner hver måned</div>
    </div>
  </label>

  <!-- Komplett -->
  <label class="plan-card" data-plan="komplett">
    <input type="radio" name="plan" value="komplett">
    <span class="radio-circle"></span>
    <div class="plan-info">
      <div class="plan-name">Komplett</div>
      <div class="plan-desc">Papiravisa hver dag med alle magasiner + full tilgang på nett hver dag.</div>
      <div class="plan-price">Deretter 539 kroner hver måned</div>
      <div class="plan-price-student">Deretter 405 kroner hver måned</div>
    </div>
  </label>

  <hr class="divider">

  <button class="btn-continue" id="btnContinue">Gå videre</button>

  <div class="vipps-wrap">
    <svg class="vipps-logo" viewBox="0 0 120 30" xmlns="http://www.w3.org/2000/svg">
      <text x="28" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="800" fill="#1a1a1a">v</text>
      <circle cx="46" cy="12" r="3.2" fill="#ff5b24"/>
      <text x="42" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="800" fill="#1a1a1a">ipps</text>
    </svg>
  </div>
</div>

<script>
  const paperCards = document.querySelectorAll('.plan-card');
  const digitalCard = document.getElementById('digitalCard');
  const digitalOptions = document.querySelectorAll('.digital-option');
  const allRadios = document.querySelectorAll('input[name="plan"]');

  function clearAll() {
    paperCards.forEach(c => c.classList.remove('selected'));
    digitalCard.classList.remove('has-selection');
    digitalOptions.forEach(o => o.classList.remove('selected'));
  }

  paperCards.forEach(card => {
    card.addEventListener('click', () => {
      clearAll();
      card.classList.add('selected');
      card.querySelector('input[type="radio"]').checked = true;
    });
  });

  digitalOptions.forEach(opt => {
    opt.addEventListener('click', () => {
      clearAll();
      digitalCard.classList.add('has-selection');
      opt.classList.add('selected');
      opt.querySelector('input[type="radio"]').checked = true;
    });
  });

  const togStandard = document.getElementById('togStandard');
  const togStudent = document.getElementById('togStudent');
  const subPage = document.getElementById('subPage');

  togStandard.addEventListener('change', () => subPage.classList.remove('student-prices'));
  togStudent.addEventListener('change', () => subPage.classList.add('student-prices'));

  document.getElementById('btnContinue').addEventListener('click', () => {
    const checked = document.querySelector('input[name="plan"]:checked');
    if (!checked) { alert('Velg et abonnement først.'); return; }
    const audience = document.querySelector('input[name="audience"]:checked').value;
    alert('Demo: Du valgte ' + checked.value + ' (' + audience + '). Videre til betaling med Vipps.');
  });
</script>

</body>
</html>
